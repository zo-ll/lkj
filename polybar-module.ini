; Polybar module configuration for LKJ
; Add this to your polybar config.ini

[module/lkj]
type = custom/script

; Check daemon status every 2 seconds
exec = /home/az/.local/bin/lkj-polybar check
interval = 2

; Click to stop daemon
click-left = /home/az/.local/bin/lkj-polybar stop

; Formatting
format = <label>
format-padding = 1
format-background = ${colors.background}
format-foreground = ${colors.foreground}

; Label shows the icon
label = %output%

; Tooltip on hover
; Shows status on hover
; You can customize colors here if needed
